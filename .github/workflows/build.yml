name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'

    - name: Gerar build.gradle (raiz)
      run: |
        cat > build.gradle << 'EOF'
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.0'
            }
        }
        EOF

    - name: Gerar settings.gradle
      run: |
        cat > settings.gradle << 'EOF'
        rootProject.name = "GameResolution"
        include ':app'
        EOF

    - name: Gerar gradle.properties
      run: |
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m
        android.useAndroidX=false
        EOF

    - name: Gerar app/build.gradle
      run: |
        cat > app/build.gradle << 'EOF'
        apply plugin: 'com.android.application'
        
        android {
            namespace 'com.gameresolution'
            compileSdk 34
            
            defaultConfig {
                applicationId "com.gameresolution"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
        }
        EOF

    - name: Gerar gradle wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Build APK Debug
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GameResolution
        path: app/build/outputs/apk/debug/app-debug.apk
