name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Gerar build.gradle raiz
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.7.0'
              }
          }
          EOF

      - name: Gerar settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          rootProject.name = "GameResolution"
          include ':app'
          EOF

      - name: Gerar gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

      - name: Gerar app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              namespace 'com.gameresolution'
              compileSdk 36
              
              defaultConfig {
                  applicationId "com.gameresolution"
                  minSdk 21
                  targetSdk 36
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          
          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22'
              }
          }
          
          dependencies {
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.appcompat:appcompat:1.7.0'
          }
          
          repositories {
              google()
              mavenCentral()
          }
          EOF

      - name: Gerar gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build APK Debug
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GameResolution
          path: app/build/outputs/apk/debug/app-debug.apk
